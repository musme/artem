<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Введите код — Твой VPS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&subset=cyrillic&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-[#f0f2f5] font-['Manrope',sans-serif] min-h-screen flex flex-col items-center justify-center pb-12"
  >
    <!-- Top panel -->
    <div class="w-[350px] h-[60px] flex items-center py-2">
      <a
        href="/index.html"
        class="flex items-center gap-2 px-2 py-1.5 rounded-lg cursor-pointer no-underline"
      >
        <svg
          class="w-5 h-5 shrink-0"
          viewBox="0 0 20 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M13.125 15.833L7.29167 10L13.125 4.16667"
            stroke="#010101"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span class="text-[#010101] text-base font-medium">Назад</span>
      </a>
    </div>

    <!-- Card container -->
    <div class="flex flex-col gap-6 items-center w-[350px]">
      <!-- White card -->
      <div
        class="bg-white rounded-[4px] w-full flex flex-col items-start p-6 overflow-hidden"
      >
        <!-- Title -->
        <div class="w-full flex items-center justify-between py-6">
          <p
            class="text-base font-medium text-[#020202] text-center w-full leading-normal"
          >
            Вход/Регистрация<br />без пароля
          </p>
        </div>

        <!-- Divider -->
        <div class="w-full h-px bg-[rgba(2,2,2,0.5)]"></div>

        <!-- Subtitle -->
        <div class="w-full flex flex-col items-center gap-1 py-6 pl-6 pr-4">
          <p
            class="text-xl font-bold text-[#010101] text-center leading-[1.32] w-full"
          >
            Введите код
          </p>
        </div>

        <p
          class="text-base font-semibold text-[rgba(2,2,2,0.5)] text-center tracking-[0.64px] leading-[1.32] w-full"
        >
          Мы отправили код на 2141349@mail.ru
        </p>

        <!-- Code inputs -->
        <div class="w-full flex flex-col gap-3 items-center py-6">
          <div
            class="flex items-center justify-center w-[280px] h-[59px] rounded-lg overflow-hidden"
          >
            <div class="flex items-start justify-between px-8 flex-1">
              <input
                type="text"
                maxlength="1"
                value="1"
                class="w-[41px] h-[50px] shadow-[inset_0_0_0_1px_#ff4e5b] rounded-lg text-center text-xl text-[rgba(2,2,2,0.5)] font-normal font-['Manrope',sans-serif] outline-none bg-transparent"
              />
              <input
                type="text"
                maxlength="1"
                value="2"
                class="w-[41px] h-[50px] shadow-[inset_0_0_0_1px_#ff4e5b] rounded-lg text-center text-xl text-[rgba(2,2,2,0.5)] font-normal font-['Manrope',sans-serif] outline-none bg-transparent"
              />
              <input
                type="text"
                maxlength="1"
                value="3"
                class="w-[41px] h-[50px] shadow-[inset_0_0_0_1px_#ff4e5b] rounded-lg text-center text-xl text-[rgba(2,2,2,0.5)] font-normal font-['Manrope',sans-serif] outline-none bg-transparent"
              />
              <input
                type="text"
                maxlength="1"
                value="4"
                class="w-[41px] h-[50px] shadow-[inset_0_0_0_1px_#ff4e5b] rounded-lg text-center text-xl text-[rgba(2,2,2,0.5)] font-normal font-['Manrope',sans-serif] outline-none bg-transparent"
              />
            </div>
          </div>

          <!-- Resend -->
          <p class="text-[15px] text-center w-full text-[#020202]">
            Неверный код. Попробуйте ещё раз
          </p>
        </div>
      </div>

      <!-- Footer text -->
      <p class="text-sm text-center w-full leading-[1.3]">
        <span class="text-[#020202]"
          >Отправляя форму, вы подтверждаете свое согласие на
        </span>
        <span class="text-[#c8b3a3]">обработку персональных данных</span>
      </p>
    </div>
  </body>
</html>
