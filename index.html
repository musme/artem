<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход — Твой VPS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&subset=cyrillic&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-[#f0f2f5] font-['Manrope',sans-serif] min-h-screen flex flex-col items-center justify-center pb-12"
  >
    <!-- Top panel -->
    <div class="w-[350px] h-[60px] flex items-center py-2">
      <div class="flex items-center gap-2 px-2 py-1.5 rounded-lg">
        <span class="text-[#010101] text-base font-medium">Твой VPS</span>
      </div>
    </div>

    <!-- Card container -->
    <div class="flex flex-col gap-5 items-start justify-center w-[328px]">
      <!-- White card -->
      <div
        class="bg-white rounded-lg shadow-[0px_0px_10px_0px_rgba(0,0,0,0.05)] w-full flex flex-col items-center pt-6 px-6 pb-px overflow-hidden"
      >
        <!-- Title -->
        <div class="w-full flex items-center justify-between py-6">
          <p class="text-base font-medium text-[#020202] text-center w-full">
            Вход без пароля
          </p>
        </div>

        <!-- Divider -->
        <div class="w-full h-px bg-[rgba(2,2,2,0.5)]"></div>

        <!-- Subtitle -->
        <div class="w-full flex flex-col items-center py-6 gap-1">
          <p
            class="text-xl font-semibold text-[#010101] text-center leading-[1.32]"
          >
            Укажите ваш e-mail
          </p>
          <p
            class="text-[15px] font-semibold text-[rgba(2,2,2,0.5)] text-center tracking-[0.6px] leading-[1.32]"
          >
            Мы отправим код на вашу почту
          </p>
        </div>

        <!-- Email input -->
        <div class="w-[302px] py-6 flex flex-col gap-3">
          <div
            class="group relative flex items-center h-[59px] shadow-[inset_0_0_0_1px_rgba(2,2,2,0.5)] [&:hover:not(:focus-within)]:shadow-[inset_0_0_0_1.2px_#020202] focus-within:shadow-[inset_0_0_0_1px_rgba(2,2,2,0.5)] rounded-lg px-3.5 py-4 bg-white overflow-hidden transition-shadow duration-200"
          >
            <div class="flex items-center gap-[15px] flex-1">
              <svg
                class="w-5 h-4 shrink-0 text-[rgba(2,2,2,0.5)] group-[&:hover:not(:focus-within)]:text-[#020202] group-focus-within:text-[rgba(2,2,2,0.7)] transition-colors duration-200"
                viewBox="0 0 20 16"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M3 0H17C18.6569 0 20 1.34315 20 3V13C20 14.6569 18.6569 16 17 16H3C1.34315 16 0 14.6569 0 13V3C0 1.34315 1.34315 0 3 0ZM10.5 6.47L17 2H3L9.5 6.47C9.8094 6.64863 10.1906 6.64863 10.5 6.47Z"
                  fill="currentColor"
                />
              </svg>
              <input
                type="email"
                placeholder="example@gmail.com"
                class="flex-1 text-xl text-[rgba(2,2,2,0.5)] group-[&:hover:not(:focus-within)]:text-[#020202] group-focus-within:text-[rgba(2,2,2,0.7)] font-normal outline-none bg-transparent placeholder:text-[rgba(2,2,2,0.5)] group-[&:hover:not(:focus-within)]:placeholder:text-[#020202] group-focus-within:placeholder:text-[rgba(2,2,2,0.7)] transition-colors duration-200"
              />
            </div>
          </div>
        </div>
      </div>

      <!-- Submit button -->
      <a
        role="button"
        href="/auth/code.html"
        class="w-full flex items-center justify-center px-[23px] py-[13px] rounded-lg border border-[#020202] bg-[#020202] text-[#f3f4f6] hover:bg-white hover:text-[#010101] text-base font-medium leading-6 cursor-pointer shadow-[2px_2px_10px_0px_rgba(0,0,0,0.05)] transition-all duration-200"
      >
        Получить код
      </a>

      <!-- Footer text -->
      <p class="text-sm text-center w-full leading-[1.3]">
        <span class="text-[#020202]"
          >Отправляя форму, вы подтверждаете свое согласие на
        </span>
        <span class="text-[rgba(2,2,2,0.7)]"
          >обработку персональных данных</span
        >
      </p>
    </div>
  </body>
</html>
