<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Начать пользоваться — Твой VPS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&subset=cyrillic&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-[#f0f2f5] font-['Manrope',sans-serif] min-h-screen flex justify-center"
  >
    <div class="w-full max-w-[400px] flex flex-col gap-4 px-4 pt-4">
      <!-- Header: Назад + Заголовок -->
      <div class="flex items-center px-2 py-1.5 rounded-lg">
        <a
          href="/artem/mobile/home.html"
          class="shrink-0 cursor-pointer no-underline"
        >
          <svg
            class="w-5 h-5"
            viewBox="0 0 20 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M13.125 15.833L7.29167 10L13.125 4.16667"
              stroke="#010101"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </a>
        <p
          class="flex-1 text-base font-medium text-[#010101] text-center leading-[22px]"
        >
          Начать пользоваться
        </p>
        <div class="w-5"></div>
      </div>

      <!-- Card: Как пользоваться -->
      <div
        class="bg-white rounded-lg shadow-[1px_1px_5px_0px_rgba(0,0,0,0.05)] p-6 flex flex-col"
      >
        <div class="flex items-center py-0.5">
          <p class="text-[24px] font-bold text-[#020202] leading-[30px]">
            Как пользоваться?
          </p>
        </div>

        <div class="flex items-start pt-6">
          <p
            class="text-base font-semibold text-[rgba(2,2,2)] tracking-[0.56px] leading-[1.32]"
          >
            Установите приложение и начните пользоваться через минуту
          </p>
        </div>

        <!-- Ссылка для активации -->
        <div class="flex flex-col gap-1 pt-6">
          <p
            class="text-base font-semibold text-[#9747FF] tracking-[0.64px] leading-[1.32]"
          >
            Ссылка для активации подписки
          </p>
          <div class="flex items-center gap-2">
            <p
              class="text-base font-semibold text-[rgba(2,2,2,0.5)] tracking-[0.64px] leading-[1.32] break-all flex-1"
            >
              https://chatgpt.com/c/69c0f2ce-9b98-8387-86cb-3225245b96fa
            </p>
            <button class="cursor-pointer shrink-0 mt-0.5" title="Копировать">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M20 6V21H8V6H20ZM18 8H10V19H18V8ZM15 2V4H6V16H4V2H15Z"
                  fill="#020202"
                />
              </svg>
            </button>
          </div>
        </div>

        <!-- Описание -->
        <div class="flex items-start pt-4 pb-[26px]">
          <p
            class="text-base font-semibold text-[rgba(2,2,2)] tracking-[0.56px] leading-[1.32]"
          >
            Подписка действует до трех устройств, объем трафика зависит от
            провайдера
          </p>
        </div>

        <!-- Кнопки скачивания -->
        <div class="flex flex-col gap-4">
          <button
            class="w-full h-[45px] flex items-center px-[23px] gap-3 rounded-lg bg-white border border-[rgba(2,2,2,0.54)] text-base font-medium text-[rgba(2,2,2,0.7)] leading-6 cursor-pointer hover:bg-[rgba(2,2,2,0.5)] hover:text-white transition-all duration-200"
          >
            <svg
              class="w-[18px] h-[18px] shrink-0"
              viewBox="0 0 18 18"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"

                  fill="currentColor"
                />
              </g>
              <defs>
                <clipPath id="clip0_ios2">
                  <rect width="18" height="18" fill="white" />
                </clipPath>
              </defs>
            </svg>
            Скачать для IOS
          </button>
          <button
            class="w-full h-[45px] flex items-center px-[23px] gap-3 rounded-lg bg-white border border-[rgba(2,2,2,0.54)] text-base font-medium text-[rgba(2,2,2,0.7)] leading-6 cursor-pointer hover:bg-[rgba(2,2,2,0.5)] hover:text-white transition-all duration-200"
          >
            <svg
              class="w-[18px] h-[18px] shrink-0"
              viewBox="0 0 18 18"

                fill="currentColor"

                fill="currentColor"
              />

          <button
            class="w-full h-[45px] flex items-center px-[23px] gap-3 rounded-lg bg-white border border-[rgba(2,2,2,0.5)] text-base font-medium text-[rgba(2,2,2,0.7)] leading-6 cursor-pointer hover:bg-[rgba(2,2,2,0.5)] hover:text-white transition-all duration-200"
          >
            <svg
              class="w-[18px] h-[18px] shrink-0"
              viewBox="0 0 18 18"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >

                />

              <defs>

                  <rect width="18" height="18" fill="white" />

        </div>
      </div>
    </div>

</html>
